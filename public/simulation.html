<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FIFA 2026 Crowd Simulation</title>
  <link rel="stylesheet" href="css/simulation.css" />
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="top-bar">
      <div class="header-left">
        <a href="/" class="btn btn-back" style="text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Back
        </a>
        <h1 class="header-title">FIFA Crowd Management — 2D Live Crowd Simulation</h1>
      </div>
      <div class="stats-container">
        <div class="stat-card">
          <span class="stat-label">Total People</span>
          <span class="stat-value val-safe" id="stat-total">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Occupancy</span>
          <span class="stat-value val-safe" id="stat-occ">0%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Active Alerts</span>
          <span class="stat-value val-safe" id="stat-alerts">0</span>
        </div>
      </div>
    </div>
    
    <!-- Canvas Area -->
    <div class="canvas-container" id="canvas-container">
      <canvas id="sim-canvas"></canvas>
    </div>
    
    <!-- Sidebar -->
    <div class="sidebar">
      <h3 class="sidebar-title">Live Incident Alerts</h3>
      <div id="alerts-panel"></div>
    </div>
    
    <!-- Bottom Controls -->
    <div class="bottom-bar">
      <div class="control-group">
        <button class="btn" id="btn-playpause">Pause</button>
        <button class="btn" id="btn-reset">Reset</button>
      </div>
      <div class="control-group">
        <span class="control-label">Scenario Override:</span>
        <button class="btn btn-scen active" id="btn-scen-normal">Normal Flow</button>
        <button class="btn btn-scen" id="btn-scen-surge">Exit Surge</button>
        <button class="btn btn-scen" id="btn-scen-evac">Emergency Evac</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="js/simulation/main.js"></script>
</body>
</html>
