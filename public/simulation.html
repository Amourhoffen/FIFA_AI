<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FIFA 2026 Crowd Simulation</title>
  <meta name="description" content="Live 2D Crowd Flow Simulation Dashboard for FIFA 2026 Stadium Crowd Management and Security." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/simulation.css" />
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="top-bar">
      <div class="header-left">
        <a href="/" class="btn btn-back" style="text-decoration:none;" aria-label="Go back to dashboard">
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          Back
        </a>
        <h1 class="header-title">FIFA Crowd Management — Smart Control Room</h1>
      </div>
      <div class="stats-container">
        <div class="stat-card">
          <span class="stat-label">Total People</span>
          <span class="stat-value val-safe" id="stat-total">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Occupancy</span>
          <span class="stat-value val-safe" id="stat-occ">0%</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Active Alerts</span>
          <span class="stat-value val-safe" id="stat-alerts">0</span>
        </div>
      </div>
    </div>
    
    <!-- Canvas Area -->
    <main class="canvas-container" id="canvas-container" aria-label="Live Crowd Simulation Map">
      <canvas id="sim-canvas" aria-label="Interactive 2D physics simulation of stadium crowd flow"></canvas>
    </main>
    
    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Live Incident Alerts Sidebar">
      <h3 class="sidebar-title">Live Incident Alerts</h3>
      <div id="alerts-panel" aria-live="polite"></div>
    </aside>
    
    <!-- Bottom Controls -->
    <nav class="bottom-bar" aria-label="Simulation Controls">
      <div class="control-group">
        <button class="btn" id="btn-playpause" aria-label="Pause Simulation">Pause</button>
        <button class="btn" id="btn-reset" aria-label="Reset Simulation">Reset</button>
      </div>
      <div class="control-group">
        <span class="control-label" id="scenario-label">Scenario Override:</span>
        <button class="btn btn-scen active" id="btn-scen-normal" aria-pressed="true" aria-labelledby="scenario-label">Normal Flow</button>
        <button class="btn btn-scen" id="btn-scen-surge" aria-pressed="false" aria-labelledby="scenario-label">Exit Surge</button>
        <button class="btn btn-scen" id="btn-scen-evac" aria-pressed="false" aria-labelledby="scenario-label">Emergency Evac</button>
      </div>
    </nav>
  </div>
  
  <script type="module" src="js/simulation/main.js"></script>
</body>
</html>
